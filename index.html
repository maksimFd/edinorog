<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мой единорожка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        /* --- ЭКРАН ЗАГРУЗКИ --- */
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            display: flex;
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease;
        }

        #loadingScreen img {
            width: 350px; 
            max-width: 85vw; 
            margin-bottom: 40px; 
            animation: pulse 1.5s infinite;
            mix-blend-mode: multiply; 
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .progress-bar-container {
            width: 220px; 
            height: 5px; 
            background-color: rgba(255, 255, 255, 0.3); 
            border-radius: 10px; 
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%; 
            background-color: #ffffff; 
            border-radius: 10px;
            transition: width 2.5s cubic-bezier(0.4, 0.0, 0.2, 1); 
        }

        /* --- ГЛАВНОЕ МЕНЮ --- */
        #mainMenu {
            display: none; 
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            padding-top: 6vh; 
        }

        .header-container {
            text-align: center;
            margin-bottom: auto; 
        }

        h1 {
            color: #ffffff;
            font-size: 3.2rem;
            line-height: 1.2;
            text-shadow: 0px 5px 0px #ff6b81, 0 0 20px rgba(255,255,255,0.7);
        }

        .unicorn-icon {
            font-size: 5rem;
            margin-bottom: 5px;
            filter: drop-shadow(0px 5px 0px #ff6b81);
        }

        .window-container {
            background-color: rgba(255, 182, 193, 0.4); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 92%; 
            height: 50vh; 
            margin-bottom: 3vh; 
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            gap: 25px; 
            padding: 20px;
        }

        button {
            background-color: #ff6b81;
            color: white;
            border: none;
            border-radius: 35px;
            padding: 22px;
            font-size: 1.8rem;
            font-weight: bold;
            font-family: inherit;
            box-shadow: 0 8px 0 #d03e56, 0 15px 20px rgba(255, 107, 129, 0.4);
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            width: 90%; 
            max-width: 320px;
        }

        button:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #d03e56, 0 5px 10px rgba(255, 107, 129, 0.4);
        }

        .small-btn {
            font-size: 1.2rem;
            padding: 15px;
            width: 200px;
            margin-bottom: 20px;
        }

        /* --- ИГРОВОЙ ЭКРАН --- */
        #gameScreen {
            display: none;
            flex-direction: column;
            justify-content: space-between; /* Распределяем элементы по вертикали */
            align-items: center;
            height: 100%;
            width: 100%;
            padding: 40px 20px 20px 20px;
        }

        /* Счетчик кликов/очков */
        #scoreBoard {
            background-color: rgba(255, 255, 255, 0.6);
            padding: 10px 30px;
            border-radius: 20px;
            color: #ff6b81;
            font-size: 2rem;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 2px solid white;
        }

        /* Контейнер для нашего пухляша */
        #unicornContainer {
            flex-grow: 1; /* Занимает все свободное место в центре */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Сам единорожка */
        #unicornChar {
            width: 280px; /* Оптимальный размер для тапов */
            max-width: 80vw;
            filter: drop-shadow(0 15px 20px rgba(0,0,0,0.15));
            /* Анимация спокойного покачивания (дыхания) */
            animation: float 3s ease-in-out infinite;
            cursor: pointer;
            /* Убираем фон картинки, если он есть, через наложение */
            mix-blend-mode: multiply;
        }

        /* Анимация покачивания */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        /* Анимация прыжка при тапе */
        .bounce {
            animation: jump 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important; /* Перебивает float на время клика */
        }

        @keyframes jump {
            0% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.1) translateY(-30px); }
            100% { transform: scale(1) translateY(0); }
        }

    </style>
</head>
<body>

    <!-- Экран загрузки -->
    <div id="loadingScreen">
        <img src="logo.png" alt="Maksimkin Logo">
        <div class="progress-bar-container">
            <div class="progress-bar-fill" id="progressBar"></div>
        </div>
    </div>

    <!-- Главное меню -->
    <div id="mainMenu">
        <div class="header-container">
            <div class="unicorn-icon">🦄</div>
            <h1>Мой<br>единорожка</h1>
        </div>
        
        <div class="window-container">
            <button id="playBtn">Играть</button>
            <button id="exitBtn">Выход</button>
        </div>
    </div>

    <!-- Игровой экран -->
    <div id="gameScreen">
        <!-- Счетчик -->
        <div id="scoreBoard">💖 <span id="scoreText">0</span></div>

        <!-- Наш персонаж -->
        <div id="unicornContainer">
            <img src="image_61258f.jpg" alt="Единорожка" id="unicornChar">
        </div>

        <!-- Кнопка возврата -->
        <button id="backBtn" class="small-btn">В меню</button>
    </div>

    <script>
        // Элементы интерфейса
        const loadingScreen = document.getElementById('loadingScreen');
        const progressBar = document.getElementById('progressBar');
        const mainMenu = document.getElementById('mainMenu');
        const gameScreen = document.getElementById('gameScreen');
        
        // Кнопки
        const playBtn = document.getElementById('playBtn');
        const exitBtn = document.getElementById('exitBtn');
        const backBtn = document.getElementById('backBtn');

        // Игровые элементы
        const unicornChar = document.getElementById('unicornChar');
        const scoreText = document.getElementById('scoreText');
        
        let score = 0; // Переменная для хранения очков

        // Логика загрузочного экрана
        window.addEventListener('load', () => {
            setTimeout(() => {
                progressBar.style.width = '100%';
            }, 50);

            setTimeout(() => {
                loadingScreen.style.opacity = '0'; 
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    mainMenu.style.display = 'flex'; 
                }, 800);
            }, 2500); 
        });

        // Навигация
        playBtn.addEventListener('click', () => {
            mainMenu.style.display = 'none';
            gameScreen.style.display = 'flex';
        });

        backBtn.addEventListener('click', () => {
            gameScreen.style.display = 'none';
            mainMenu.style.display = 'flex';
        });

        exitBtn.addEventListener('click', () => {
            alert('Спасибо за игру! Единорожка будет скучать! 💖');
        });

        // --- ЛОГИКА ИГРЫ (КЛИКЕР) ---

        // Обработка тапа по единорожке
        unicornChar.addEventListener('click', () => {
            // Увеличиваем очки
            score++;
            scoreText.innerText = score;

            // Добавляем класс с анимацией прыжка
            unicornChar.classList.add('bounce');

            // Удаляем класс через 300мс (когда закончится анимация), чтобы можно было кликнуть снова
            setTimeout(() => {
                unicornChar.classList.remove('bounce');
            }, 300);
            
            // Если на телефоне есть вибромоторчик, делаем легкий тактильный отклик (работает не во всех браузерах)
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }
        });

    </script>
</body>
</html>
