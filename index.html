<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мой единорожка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        /* --- ЭКРАН ЗАГРУЗКИ --- */
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #ffffff; /* Белый фон под картинку */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999; /* Поверх всех остальных элементов */
            transition: opacity 0.8s ease; /* Плавное исчезновение */
        }

        #loadingScreen img {
            max-width: 80%; /* Чтобы логотип не вылезал за края на маленьких экранах */
            animation: pulse 1.5s infinite; /* Эффект "дыхания" логотипа */
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Главный контейнер (Изначально скрыт) */
        #mainMenu {
            display: none; /* Скрыто до окончания загрузки */
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            padding-top: 6vh; 
        }

        .header-container {
            text-align: center;
            margin-bottom: auto; 
        }

        h1 {
            color: #ffffff;
            font-size: 3.2rem;
            line-height: 1.2;
            text-shadow: 0px 5px 0px #ff6b81, 0 0 20px rgba(255,255,255,0.7);
        }

        .unicorn-icon {
            font-size: 5rem;
            margin-bottom: 5px;
            filter: drop-shadow(0px 5px 0px #ff6b81);
        }

        /* Панель кнопок */
        .window-container {
            background-color: rgba(255, 182, 193, 0.4); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            
            width: 92%; 
            height: 50vh; 
            margin-bottom: 3vh; 
            
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            gap: 25px; 
            padding: 20px;
        }

        button {
            background-color: #ff6b81;
            color: white;
            border: none;
            border-radius: 35px;
            padding: 22px;
            font-size: 1.8rem;
            font-weight: bold;
            font-family: inherit;
            box-shadow: 0 8px 0 #d03e56, 0 15px 20px rgba(255, 107, 129, 0.4);
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            width: 90%; 
            max-width: 320px;
        }

        button:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #d03e56, 0 5px 10px rgba(255, 107, 129, 0.4);
        }

        #gameScreen {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            width: 100%;
            color: white;
            font-size: 2rem;
            text-align: center;
            text-shadow: 0 2px 4px #ff6b81;
            padding: 20px;
        }

        .small-btn {
            margin-top: 30px;
            font-size: 1.2rem;
            padding: 15px;
            width: 200px;
        }
    </style>
</head>
<body>

    <!-- Экран загрузки с твоим логотипом -->
    <div id="loadingScreen">
        <img src="logo.png" alt="Maksimkin Logo">
    </div>

    <!-- Главное меню -->
    <div id="mainMenu">
        <div class="header-container">
            <div class="unicorn-icon">🦄</div>
            <h1>Мой<br>единорожка</h1>
        </div>
        
        <div class="window-container">
            <button id="playBtn">Играть</button>
            <button id="exitBtn">Выход</button>
        </div>
    </div>

    <!-- Игровой экран -->
    <div id="gameScreen">
        <p>Здесь скоро появится твой единорожка! ✨</p>
        <button id="backBtn" class="small-btn">Вернуться</button>
    </div>

    <script>
        const loadingScreen = document.getElementById('loadingScreen');
        const mainMenu = document.getElementById('mainMenu');
        const gameScreen = document.getElementById('gameScreen');
        const playBtn = document.getElementById('playBtn');
        const exitBtn = document.getElementById('exitBtn');
        const backBtn = document.getElementById('backBtn');

        // Логика загрузочного экрана
        window.addEventListener('load', () => {
            // Имитация времени загрузки (2.5 секунды)
            setTimeout(() => {
                loadingScreen.style.opacity = '0'; // Начинаем плавное исчезновение
                
                // Ждем окончания анимации (0.8с) и полностью удаляем экран
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    mainMenu.style.display = 'flex'; // Показываем меню
                }, 800);
                
            }, 2500);
        });

        // Навигация
        playBtn.addEventListener('click', () => {
            mainMenu.style.display = 'none';
            gameScreen.style.display = 'flex';
        });

        backBtn.addEventListener('click', () => {
            gameScreen.style.display = 'none';
            mainMenu.style.display = 'flex';
        });

        exitBtn.addEventListener('click', () => {
            alert('Спасибо за игру! Единорожка будет скучать! 💖');
        });
    </script>
</body>
</html>
