<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мой единорожка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        /* Контейнер главного меню */
        #mainMenu {
            display: flex;
            flex-direction: column;
            justify-content: center; /* Теперь всё собирается в центре экрана */
            align-items: center;
            width: 100%;
            height: 100%;
            padding-bottom: 12vh; /* Слегка приподнимаем весь блок вверх */
            gap: 30px; /* Расстояние между заголовком и окошком */
        }

        .header-container {
            text-align: center;
        }

        h1 {
            color: #ffffff;
            font-size: 3.2rem;
            line-height: 1.2;
            text-shadow: 0px 5px 0px #ff6b81, 0 0 20px rgba(255,255,255,0.7);
        }

        .unicorn-icon {
            font-size: 5rem;
            margin-bottom: 10px;
            filter: drop-shadow(0px 5px 0px #ff6b81);
        }

        /* Новое прозрачное окошко (на основе icon dlay knopok.png) */
        .window-container {
            /* Берем голубой цвет с картинки, но делаем его прозрачным на 40% (0.4) */
            background-color: rgba(179, 204, 255, 0.4); 
            border-radius: 30px; /* Закругляем края */
            padding: 40px 20px;
            width: 90%;
            max-width: 320px;
            
            /* Создаем эффект размытия фона под окошком (эффект стекла) */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px); /* Для поддержки на iPhone */
            
            /* Добавляем легкую белую рамку для объема */
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            
            display: flex;
            flex-direction: column;
            gap: 20px; /* Расстояние между кнопками внутри окошка */
        }

        button {
            background-color: #ff6b81;
            color: white;
            border: none;
            border-radius: 35px;
            padding: 20px;
            font-size: 1.6rem;
            font-weight: bold;
            font-family: inherit;
            box-shadow: 0 8px 0 #d03e56, 0 15px 20px rgba(255, 107, 129, 0.4);
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            width: 100%;
        }

        button:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #d03e56, 0 5px 10px rgba(255, 107, 129, 0.4);
        }

        #gameScreen {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            width: 100%;
            color: white;
            font-size: 2rem;
            text-align: center;
            text-shadow: 0 2px 4px #ff6b81;
            padding: 20px;
        }

        .small-btn {
            margin-top: 30px;
            font-size: 1.2rem;
            padding: 15px;
            width: 200px;
        }
    </style>
</head>
<body>

    <!-- Главное меню -->
    <div id="mainMenu">
        <div class="header-container">
            <div class="unicorn-icon">🦄</div>
            <h1>Мой<br>единорожка</h1>
        </div>
        
        <!-- Окошко, оборачивающее кнопки -->
        <div class="window-container">
            <button id="playBtn">Играть</button>
            <button id="exitBtn">Выход</button>
        </div>
    </div>

    <!-- Игровой экран -->
    <div id="gameScreen">
        <p>Здесь скоро появится твой единорожка! ✨</p>
        <button id="backBtn" class="small-btn">Вернуться</button>
    </div>

    <script>
        const mainMenu = document.getElementById('mainMenu');
        const gameScreen = document.getElementById('gameScreen');
        const playBtn = document.getElementById('playBtn');
        const exitBtn = document.getElementById('exitBtn');
        const backBtn = document.getElementById('backBtn');

        playBtn.addEventListener('click', () => {
            mainMenu.style.display = 'none';
            gameScreen.style.display = 'flex';
        });

        backBtn.addEventListener('click', () => {
            gameScreen.style.display = 'none';
            mainMenu.style.display = 'flex';
        });

        exitBtn.addEventListener('click', () => {
            alert('Спасибо за игру! Единорожка будет скучать! 💖');
        });
    </script>
</body>
</html>
