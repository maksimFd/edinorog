<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мой единорожка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #ff9a9e;
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        /* --- ЭКРАН ЗАГРУЗКИ --- */
        #loadingScreen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.8s ease;
        }
        #loadingScreen img { width: 350px; max-width: 85vw; margin-bottom: 40px; mix-blend-mode: multiply; }

        .progress-bar-container {
            width: 220px; height: 5px; background-color: rgba(255, 255, 255, 0.3); 
            border-radius: 10px; overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%; width: 0%; background-color: #ffffff; border-radius: 10px;
            transition: width 2.5s cubic-bezier(0.4, 0.0, 0.2, 1); 
        }

        /* --- ГЛАВНОЕ МЕНЮ --- */
        #mainMenu {
            display: none; /* СКРЫТО ПО УМОЛЧАНИЮ */
            flex-direction: column; align-items: center; width: 100%; height: 100%; padding-top: 6vh; 
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            position: absolute; z-index: 1000;
        }
        .header-container { text-align: center; margin-bottom: auto; }
        h1 { color: #ffffff; font-size: 3.2rem; line-height: 1.2; text-shadow: 0px 5px 0px #ff6b81, 0 0 20px rgba(255,255,255,0.7); }
        .unicorn-icon { font-size: 5rem; margin-bottom: 5px; filter: drop-shadow(0px 5px 0px #ff6b81); }

        .window-container {
            background-color: rgba(255, 182, 193, 0.4); backdrop-filter: blur(12px);
            border-radius: 40px; border: 2px solid rgba(255, 255, 255, 0.6); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 92%; height: 50vh; margin-bottom: 3vh; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 25px; padding: 20px;
        }
        button.menu-btn {
            background-color: #ff6b81; color: white; border: none; border-radius: 35px; padding: 22px; font-size: 1.8rem; font-weight: bold; font-family: inherit;
            box-shadow: 0 8px 0 #d03e56, 0 15px 20px rgba(255, 107, 129, 0.4); cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; width: 90%; max-width: 320px;
        }
        button.menu-btn:active { transform: translateY(8px); box-shadow: 0 0 0 #d03e56, 0 5px 10px rgba(255, 107, 129, 0.4); }

        /* --- ИГРОВОЙ ЭКРАН (АДАПТИВНЫЙ FLEXBOX) --- */
        #gameScreen {
            display: none; /* СКРЫТО ПО УМОЛЧАНИЮ */
            flex-direction: column; 
            justify-content: flex-end; /* Прижимаем контент книзу */
            align-items: center; 
            height: 100%; 
            width: 100%; 
            position: relative;
            padding-bottom: 4vh; /* Отступ снизу для мобилок */
        }

        /* SVG Фон комнаты (тянется на весь экран) */
        #roomBg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            object-fit: cover;
        }

        /* Облачко с текстом */
        #speechBubble {
            --bg-color: rgba(255, 255, 255, 0.95);
            --text-color: #d03e56;
            position: absolute; top: 12%; left: 50%; transform: translateX(-50%);
            background-color: var(--bg-color); color: var(--text-color); padding: 12px 25px;
            border-radius: 25px; font-weight: bold; font-size: 1.3rem; box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            opacity: 0; transition: opacity 0.3s ease; pointer-events: none; white-space: nowrap; z-index: 10;
        }
        #speechBubble::after {
            content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
            border-width: 10px 10px 0; border-style: solid; border-color: var(--bg-color) transparent transparent transparent;
        }

        /* Контейнер единорожки (гибкий, чтобы не наезжать на кнопки) */
        #unicornContainer {
            flex-grow: 1; /* Занимает всё свободное место между верхом и индикаторами */
            display: flex; 
            align-items: flex-end; /* Единорожка стоит на полу */
            justify-content: center; 
            width: 100%; 
            z-index: 2;
            margin-bottom: 2vh; /* Отступ от индикаторов */
        }
        
        #unicornSvg {
            width: 90vw; /* Крупно на мобилке */
            max-width: 450px; /* Ограничение для ПК */
            max-height: 55vh; /* Не дает растянуться слишком сильно в высоту */
            filter: drop-shadow(0 15px 15px rgba(0,0,0,0.2));
            transition: transform 0.1s ease; 
            touch-action: none; 
            cursor: pointer;
        }

        .blinking-eyes { transform-origin: 150px 115px; animation: blink 4s infinite; }
        @keyframes blink { 0%, 94%, 98%, 100% { transform: scaleY(1); } 96% { transform: scaleY(0.1); } }
        
        .wagging-tail { transform-origin: 180px 200px; animation: wag 2s ease-in-out infinite; }
        @keyframes wag { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(15deg); } }

        /* --- ИНДИКАТОРЫ --- */
        .stats-container {
            display: flex; 
            gap: 5vw; /* Гибкий отступ между кругами */
            z-index: 5; 
            justify-content: center;
            width: 100%;
        }
        .stat-indicator {
            width: 75px; height: 75px; border-radius: 50%; background: rgba(255, 255, 255, 0.8);
            border: 4px solid white; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .fill-level { position: absolute; bottom: 0; width: 100%; transition: height 0.5s ease; z-index: 1; }
        #hungerFill { background: #e67e22; }
        #happyFill { background: #e74c3c; }
        #energyFill { background: #3498db; }
        .icon { position: relative; z-index: 2; font-size: 1.8rem; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }

    </style>
</head>
<body>

    <!-- ЭКРАН ЗАГРУЗКИ -->
    <div id="loadingScreen">
        <img src="logo.png" alt="Logo">
        <div class="progress-bar-container"><div class="progress-bar-fill" id="progressBar"></div></div>
    </div>

    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="mainMenu">
        <div class="header-container">
            <div class="unicorn-icon">🦄</div>
            <h1>Мой<br>единорожка</h1>
        </div>
        <div class="window-container">
            <button class="menu-btn" id="playBtn">Играть</button>
            <button class="menu-btn" id="exitBtn">Выход</button>
        </div>
    </div>

    <!-- ИГРОВОЙ ЭКРАН -->
    <div id="gameScreen">
        
        <!-- Облачко уведомлений -->
        <div id="speechBubble">Приветик!</div>

        <!-- ВЕКТОРНЫЙ ФОН: ИГРОВАЯ ГОСТИНАЯ -->
        <svg id="roomBg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
            <defs>
                <pattern id="wallPattern" width="40" height="60" patternUnits="userSpaceOnUse">
                    <polygon points="20,0 40,30 20,60 0,30" fill="rgba(0,0,0,0.04)" />
                </pattern>
                <pattern id="floorPattern" width="100" height="60" patternUnits="userSpaceOnUse">
                    <rect x="0" y="0" width="50" height="30" fill="rgba(0,0,0,0.03)" />
                    <rect x="50" y="30" width="50" height="30" fill="rgba(0,0,0,0.03)" />
                </pattern>
            </defs>
            <!-- Стена -->
            <rect width="100%" height="400" fill="#a4d17a" />
            <rect width="100%" height="400" fill="url(#wallPattern)" />
            <!-- Пол -->
            <rect y="400" width="100%" height="200" fill="#c3d052" />
            <rect y="400" width="100%" height="200" fill="url(#floorPattern)" />
            <!-- Плинтус -->
            <rect y="390" width="100%" height="10" fill="#ffffff" opacity="0.8" />

            <!-- Окно (слева) -->
            <rect x="-20" y="50" width="220" height="340" fill="#ffffff" stroke="#dcdcdc" stroke-width="15"/>
            <rect x="0" y="65" width="180" height="310" fill="#74b9ff" />
            <polygon points="195,400 450,400 350,600 120,600" fill="#f6e58d" opacity="0.3" />

            <!-- Картина -->
            <rect x="320" y="60" width="120" height="120" fill="#ffffff" stroke="#a4b0be" stroke-width="6"/>
            <rect x="330" y="70" width="100" height="100" fill="#fbc531" />
            <circle cx="380" cy="130" r="30" fill="#ff4757" />
            <polygon points="355,110 365,85 380,105" fill="#ff4757"/>
            <polygon points="380,105 395,85 405,110" fill="#ff4757"/>
            <circle cx="368" cy="125" r="5" fill="#ffffff" />
            <circle cx="392" cy="125" r="5" fill="#ffffff" />

            <!-- Телевизор (справа) -->
            <ellipse cx="660" cy="480" rx="90" ry="15" fill="rgba(0,0,0,0.15)" />
            <path d="M 580 430 L 740 430 L 750 475 L 570 475 Z" fill="#d1ccc0" /> 
            <rect x="590" y="445" width="130" height="15" fill="#2f3640" /> 
            <rect x="560" y="270" width="200" height="160" rx="25" fill="#ff7f50" /> 
            <rect x="575" y="285" width="140" height="120" rx="30" fill="#f5f6fa" /> 
            <rect x="585" y="295" width="120" height="100" rx="20" fill="#718093" /> 
            <polygon points="590,310 650,295 620,380" fill="#ffffff" opacity="0.2" /> 
            <circle cx="735" cy="310" r="10" fill="#2f3640" /> 
            <circle cx="735" cy="350" r="10" fill="#2f3640" /> 

            <!-- Кресло (слева) -->
            <ellipse cx="190" cy="465" rx="80" ry="20" fill="rgba(0,0,0,0.15)" />
            <rect x="120" y="340" width="140" height="120" rx="40" fill="#e74c3c" />
            <circle cx="150" cy="320" r="60" fill="#e74c3c" />
            <rect x="115" y="400" width="150" height="25" rx="10" fill="#f1c40f" />
        </svg>

        <!-- Единорожка в контейнере flex -->
        <div id="unicornContainer">
            <svg viewBox="40 10 220 245" id="unicornSvg">
                <defs>
                    <linearGradient id="rainbowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#ff7eb3" />
                        <stop offset="50%" stop-color="#74b9ff" />
                        <stop offset="100%" stop-color="#55efc4" />
                    </linearGradient>
                </defs>

                <ellipse cx="150" cy="240" rx="45" ry="7" fill="rgba(0,0,0,0.1)" />
                <path class="wagging-tail" d="M 175 190 C 240 180, 250 240, 190 235 Z" fill="url(#rainbowGrad)" />
                
                <ellipse cx="105" cy="220" rx="20" ry="16" fill="#f1f2f6" />
                <circle cx="105" cy="220" r="8" fill="#ff99a8" />
                <ellipse cx="195" cy="220" rx="20" ry="16" fill="#f1f2f6" />
                <circle cx="195" cy="220" r="8" fill="#ff99a8" />

                <ellipse cx="150" cy="180" rx="52" ry="48" fill="#ffffff" />

                <path d="M 150 70 C 220 80, 200 170, 170 170 C 180 140, 160 100, 150 70 Z" fill="url(#rainbowGrad)" />
                <path d="M 120 95 L 105 60 L 135 80 Z" fill="#ffffff" />
                <path d="M 180 95 L 195 60 L 165 80 Z" fill="#ffffff" />

                <circle cx="150" cy="120" r="42" fill="#ffffff" />

                <polygon points="143,78 157,78 150,25" fill="#FFD700" />
                <path d="M 145 65 L 155 65" stroke="#FFA500" stroke-width="2" />
                <path d="M 147 50 L 153 50" stroke="#FFA500" stroke-width="2" />
                <path d="M 148 35 L 152 35" stroke="#FFA500" stroke-width="2" />

                <path d="M 150 75 C 110 70, 95 110, 105 130 C 120 105, 145 95, 160 85 Z" fill="url(#rainbowGrad)" />

                <ellipse cx="150" cy="145" rx="20" ry="12" fill="#FFE4E1" />
                <path d="M 145 146 Q 150 152 155 146" fill="none" stroke="#ff6b81" stroke-width="2" stroke-linecap="round" />

                <g class="blinking-eyes">
                    <circle cx="128" cy="118" r="6" fill="#2d3436" />
                    <circle cx="126" cy="116" r="2" fill="#ffffff" />
                    <circle cx="172" cy="118" r="6" fill="#2d3436" />
                    <circle cx="170" cy="116" r="2" fill="#ffffff" />
                </g>

                <circle cx="112" cy="135" r="5" fill="#ff7675" opacity="0.6" />
                <circle cx="188" cy="135" r="5" fill="#ff7675" opacity="0.6" />

                <g transform="rotate(35 110 175)">
                    <rect x="100" y="175" width="20" height="35" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />
                    <circle cx="110" cy="202" r="5" fill="#ff99a8" />
                </g>
                <g transform="rotate(-35 190 175)">
                    <rect x="180" y="175" width="20" height="35" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />
                    <circle cx="190" cy="202" r="5" fill="#ff99a8" />
                </g>
            </svg>
        </div>

        <!-- Индикаторы состояния -->
        <div class="stats-container">
            <div class="stat-indicator"><div class="fill-level" id="hungerFill"></div><span class="icon">🍖</span></div>
            <div class="stat-indicator"><div class="fill-level" id="happyFill"></div><span class="icon">💖</span></div>
            <div class="stat-indicator"><div class="fill-level" id="energyFill"></div><span class="icon">⚡</span></div>
        </div>

    </div>

    <script>
        const loadingScreen = document.getElementById('loadingScreen');
        const progressBar = document.getElementById('progressBar');
        const mainMenu = document.getElementById('mainMenu');
        const gameScreen = document.getElementById('gameScreen');
        
        const playBtn = document.getElementById('playBtn');
        const exitBtn = document.getElementById('exitBtn');

        const hungerFill = document.getElementById('hungerFill');
        const happyFill = document.getElementById('happyFill');
        const energyFill = document.getElementById('energyFill');
        const unicornSvg = document.getElementById('unicornSvg');
        const speechBubble = document.getElementById('speechBubble');

        let stats = { hunger: 80, happy: 70, energy: 100 };
        let bubbleTimeout;

        // --- ЛОГИКА ЗАГРУЗКИ И МЕНЮ ---
        window.addEventListener('load', () => {
            // Запускаем шкалу прогресса
            setTimeout(() => { progressBar.style.width = '100%'; }, 50);
            
            // Через 2.5 секунды прячем загрузку и показываем меню
            setTimeout(() => {
                loadingScreen.style.opacity = '0'; 
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    mainMenu.style.display = 'flex'; // ПОКАЗЫВАЕМ МЕНЮ
                }, 800);
            }, 2500); 
        });

        // Кнопка "Играть"
        playBtn.addEventListener('click', () => {
            mainMenu.style.display = 'none';
            gameScreen.style.display = 'flex'; // ПОКАЗЫВАЕМ ИГРУ
            updateUI();
        });

        // Кнопка "Выход"
        exitBtn.addEventListener('click', () => {
            alert('Спасибо за игру! Единорожка будет скучать! 💖');
        });

        // --- ЛОГИКА ИНТЕРФЕЙСА ---
        function updateUI() {
            hungerFill.style.height = stats.hunger + '%';
            happyFill.style.height = stats.happy + '%';
            energyFill.style.height = stats.energy + '%';
        }

        function speak(text, type) {
            speechBubble.innerText = text;
            speechBubble.style.opacity = '1';
            if (type === 'bad') {
                speechBubble.style.setProperty('--bg-color', '#ff4757');
                speechBubble.style.setProperty('--text-color', 'white');
            } else {
                speechBubble.style.setProperty('--bg-color', 'rgba(255, 255, 255, 0.95)');
                speechBubble.style.setProperty('--text-color', '#d03e56');
            }
            clearTimeout(bubbleTimeout);
            bubbleTimeout = setTimeout(() => { speechBubble.style.opacity = '0'; }, 2000); 
        }

        function animatePet(scale = 1.05) {
            unicornSvg.style.transform = `scale(${scale})`;
            setTimeout(() => { unicornSvg.style.transform = 'scale(1)'; }, 150);
        }

        // --- ЛОГИКА ЖЕСТОВ НА ЕДИНОРОЖКЕ ---
        let startX, startY, lastX, lastY;
        let isDragging = false;
        let totalMove = 0; 

        unicornSvg.addEventListener('pointerdown', (e) => {
            startX = e.clientX; startY = e.clientY;
            lastX = e.clientX; lastY = e.clientY;
            isDragging = true; totalMove = 0;
            unicornSvg.setPointerCapture(e.pointerId);
        });

        unicornSvg.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            totalMove += Math.abs(e.clientX - lastX) + Math.abs(e.clientY - lastY);
            lastX = e.clientX; lastY = e.clientY;
        });

        unicornSvg.addEventListener('pointerup', (e) => {
            if (!isDragging) return;
            isDragging = false;
            unicornSvg.releasePointerCapture(e.pointerId);

            let dy = e.clientY - startY;

            if (totalMove < 15) {
                speak('Ой, больно! 😭', 'bad');
                stats.happy = Math.max(0, stats.happy - 15);
                animatePet(0.95); 
                updateUI();
            } else if (dy > 60) {
                speak('Ммм, как приятно! 🥰', 'good');
                stats.happy = Math.min(100, stats.happy + 15);
                animatePet(1.05);
                updateUI();
            } else if (totalMove > 40) {
                speak('Хи-хи, щекотно! ✨', 'good');
                stats.happy = Math.min(100, stats.happy + 10);
                animatePet(1.05);
                updateUI();
            }
        });

    </script>
</body>
</html>
