<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мой единорожка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #ff9a9e;
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        /* --- ЭКРАН ЗАГРУЗКИ --- */
        #loadingScreen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.8s ease;
        }
        /* ВЕРНУЛИ ЛОГОТИП И СДЕЛАЛИ ЕГО БОЛЬШИМ */
        #loadingScreen img { width: 250px; max-width: 80vw; margin-bottom: 40px; mix-blend-mode: multiply; }
        
        .progress-bar-container {
            width: 220px; height: 5px; background-color: rgba(255, 255, 255, 0.3); 
            border-radius: 10px; overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%; width: 0%; background-color: #ffffff; border-radius: 10px;
            transition: width 2.5s cubic-bezier(0.4, 0.0, 0.2, 1); 
        }

        /* --- ГЛАВНОЕ МЕНЮ И МИНИ-ИГРЫ --- */
        #mainMenu, #miniGamesScreen {
            display: none; 
            flex-direction: column; align-items: center; width: 100%; height: 100%; padding-top: 6vh; 
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            position: absolute; z-index: 1000;
        }
        
        #miniGamesScreen {
            background: linear-gradient(135deg, #74b9ff 0%, #a29bfe 100%);
            justify-content: center;
            padding-top: 0;
        }

        .header-container { text-align: center; margin-bottom: auto; }
        h1 { color: #ffffff; font-size: 3.2rem; line-height: 1.2; text-shadow: 0px 5px 0px #ff6b81, 0 0 20px rgba(255,255,255,0.7); }
        .unicorn-icon { font-size: 5rem; margin-bottom: 5px; filter: drop-shadow(0px 5px 0px #ff6b81); }

        .window-container {
            background-color: rgba(255, 182, 193, 0.4); backdrop-filter: blur(12px);
            border-radius: 40px; border: 2px solid rgba(255, 255, 255, 0.6); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 92%; height: 50vh; margin-bottom: 3vh; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 25px; padding: 20px;
        }
        button.menu-btn {
            background-color: #ff6b81; color: white; border: none; border-radius: 35px; padding: 22px; font-size: 1.8rem; font-weight: bold; font-family: inherit;
            box-shadow: 0 8px 0 #d03e56, 0 15px 20px rgba(255, 107, 129, 0.4); cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; width: 90%; max-width: 320px;
        }
        button.menu-btn:active { transform: translateY(8px); box-shadow: 0 0 0 #d03e56, 0 5px 10px rgba(255, 107, 129, 0.4); }

        /* --- ИГРОВОЙ ЭКРАН --- */
        #gameScreen {
            display: none; 
            flex-direction: column; 
            justify-content: flex-end; 
            align-items: center; 
            height: 100%; 
            width: 100%; 
            position: relative;
            padding-bottom: 4vh; 
        }

        /* Адаптивный фон */
        #roomBg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
        }

        /* --- ИГРОВАЯ ЗОНА (Ограничитель ширины) --- */
        #gameArea {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 600px; height: 100%; z-index: 1;
            pointer-events: none; 
        }

        /* --- КАРТИНА (Сдвинули влево над единорожкой) --- */
        .painting-container {
            position: absolute; top: 10%; left: 28%; transform: translateX(-50%);
            width: 20vw; max-width: 100px; z-index: 1;
        }

        /* --- ТЕЛЕВИЗОР (Жестко стоит на полу и вправо) --- */
        .tv-container {
            position: absolute; 
            bottom: 30%; /* Строго на уровне плинтуса */
            right: 3%; /* Прижат к правому краю */
            width: 40vw; max-width: 180px; 
            z-index: 1; /* Стоит У СТЕНЫ (позади единорожки) */
            cursor: pointer; transition: transform 0.1s;
            pointer-events: auto; 
        }
        .tv-container:active { transform: scale(0.95); }
        
        #tvLoadingBar { transition: width 2s linear; }
        @keyframes blinkPlay { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .play-text-anim { animation: blinkPlay 1s infinite; }

        /* --- ЕДИНОРОЖКА (Сдвинули влево, восстановили БОЛЬШОЙ размер) --- */
        #unicornContainer {
            position: absolute;
            bottom: 12%; 
            left: 28%; /* Сильно сместили влево, но оставили большим */
            transform: translateX(-50%);
            width: 75vw; /* ВОССТАНОВИЛИ БОЛЬШОЙ РАЗМЕР */
            max-width: 400px; 
            z-index: 2; 
            pointer-events: none; 
        }
        #unicornSvg {
            width: 100%; height: auto; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.2));
            transition: transform 0.1s ease; touch-action: none; cursor: pointer;
            pointer-events: none; 
        }
        
        /* Возвращаем кликабельность ТОЛЬКО нарисованным частям тела! */
        #unicornBodyGroup {
            pointer-events: auto; 
        }

        .blinking-eyes { transform-origin: 150px 115px; animation: blink 4s infinite; }
        @keyframes blink { 0%, 94%, 98%, 100% { transform: scaleY(1); } 96% { transform: scaleY(0.1); } }
        .wagging-tail { transform-origin: 180px 200px; animation: wag 2s ease-in-out infinite; }
        @keyframes wag { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(15deg); } }

        /* --- ИНДИКАТОРЫ --- */
        .stats-container { 
            position: absolute; bottom: 4%; left: 0; width: 100%;
            display: flex; gap: 5vw; z-index: 10; justify-content: center; 
            pointer-events: none;
        }
        .stat-indicator {
            width: 70px; height: 70px; border-radius: 50%; background: rgba(255, 255, 255, 0.8);
            border: 4px solid white; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            pointer-events: auto;
        }
        .fill-level { position: absolute; bottom: 0; width: 100%; transition: height 0.5s ease; z-index: 1; }
        #hungerFill { background: #e67e22; }
        #happyFill { background: #e74c3c; }
        #energyFill { background: #3498db; }
        .icon { position: relative; z-index: 2; font-size: 1.6rem; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }

        /* --- ОБЛАЧКО УВЕДОМЛЕНИЙ (Жестко привязали к единорогу) --- */
        #speechBubble {
            --bg-color: rgba(255, 255, 255, 0.95); --text-color: #d03e56;
            position: absolute; top: 18%; left: 28%; transform: translateX(-50%);
            background-color: var(--bg-color); color: var(--text-color); padding: 12px 25px;
            border-radius: 25px; font-weight: bold; font-size: 1.3rem; box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            opacity: 0; transition: opacity 0.3s ease; pointer-events: none; white-space: nowrap; z-index: 10;
        }
        #speechBubble::after {
            content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
            border-width: 10px 10px 0; border-style: solid; border-color: var(--bg-color) transparent transparent transparent;
        }

    </style>
</head>
<body>

    <!-- ЭКРАН ЗАГРУЗКИ -->
    <div id="loadingScreen">
        <!-- КАРТИНКА ЛОГОТИПА ВОССТАНОВЛЕНА -->
        <img src="logo.png" alt="Логотип">
        <div class="progress-bar-container"><div class="progress-bar-fill" id="progressBar"></div></div>
    </div>

    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="mainMenu">
        <div class="header-container">
            <div class="unicorn-icon">🦄</div>
            <h1>Мой<br>единорожка</h1>
        </div>
        <div class="window-container">
            <button class="menu-btn" id="playBtn">Играть</button>
            <button class="menu-btn" id="exitBtn">Выход</button>
        </div>
    </div>

    <!-- ЭКРАН МИНИ-ИГР -->
    <div id="miniGamesScreen">
        <div class="header-container">
            <div class="unicorn-icon">🎮</div>
            <h1>Мини-игры</h1>
        </div>
        <div class="window-container">
            <p style="color: #fff; font-size: 1.5rem; text-align: center; font-weight: bold;">Тут скоро будут игры!</p>
            <button class="menu-btn" id="backBtn" style="background-color: #a29bfe; box-shadow: 0 8px 0 #6c5ce7;">Назад в комнату</button>
        </div>
    </div>

    <!-- ИГРОВОЙ ЭКРАН -->
    <div id="gameScreen">
        
        <!-- АДАПТИВНЫЙ ФОН (НА ВЕСЬ ЭКРАН) -->
        <svg id="roomBg" width="100%" height="100%">
            <defs>
                <pattern id="wallPattern" width="40" height="60" patternUnits="userSpaceOnUse">
                    <polygon points="20,0 40,30 20,60 0,30" fill="rgba(0,0,0,0.04)" />
                </pattern>
                <pattern id="floorPattern" width="100" height="60" patternUnits="userSpaceOnUse">
                    <rect x="0" y="0" width="50" height="30" fill="rgba(0,0,0,0.03)" />
                    <rect x="50" y="30" width="50" height="30" fill="rgba(0,0,0,0.03)" />
                </pattern>
            </defs>
            <rect width="100%" height="70%" fill="#a4d17a" />
            <rect width="100%" height="70%" fill="url(#wallPattern)" />
            <rect y="70%" width="100%" height="30%" fill="#c3d052" />
            <rect y="70%" width="100%" height="30%" fill="url(#floorPattern)" />
            <rect y="70%" width="100%" height="10" fill="#ffffff" opacity="0.8" />
        </svg>

        <!-- БЕЗОПАСНАЯ ИГРОВАЯ ЗОНА -->
        <div id="gameArea">
            
            <!-- Облачко уведомлений -->
            <div id="speechBubble">Приветик!</div>

            <!-- Картина -->
            <div class="painting-container">
                <svg viewBox="0 0 120 120">
                    <rect width="120" height="120" fill="#ffffff" stroke="#a4b0be" stroke-width="6"/>
                    <rect x="10" y="10" width="100" height="100" fill="#fbc531" />
                    <circle cx="60" cy="70" r="30" fill="#ff4757" />
                    <polygon points="35,50 45,25 60,45" fill="#ff4757"/>
                    <polygon points="60,45 75,25 85,50" fill="#ff4757"/>
                    <circle cx="48" cy="65" r="5" fill="#ffffff" />
                    <circle cx="72" cy="65" r="5" fill="#ffffff" />
                </svg>
            </div>

            <!-- Телевизор (Стоит на плинтусе, кликабелен, обрезана нижняя пустота) -->
            <div class="tv-container" id="tvGroup">
                <svg viewBox="0 0 200 205">
                    <ellipse cx="100" cy="200" rx="90" ry="10" fill="rgba(0,0,0,0.15)" /> 
                    <path d="M 20 160 L 180 160 L 190 205 L 10 205 Z" fill="#d1ccc0" /> 
                    <rect x="30" y="175" width="130" height="15" fill="#2f3640" /> 
                    <rect x="0" y="0" width="200" height="160" rx="25" fill="#ff7f50" /> 
                    <rect x="15" y="15" width="140" height="120" rx="30" fill="#f5f6fa" /> 
                    <rect x="25" y="25" width="120" height="100" rx="20" fill="#718093" /> 
                    
                    <rect x="40" y="70" width="90" height="10" rx="5" fill="#2f3640" id="tvLoadingBg" style="display: none;" />
                    <rect x="40" y="70" width="0" height="10" rx="5" fill="#55efc4" id="tvLoadingBar" style="display: none;" />
                    
                    <text x="85" y="82" font-family="Arial" font-size="22" font-weight="bold" fill="#55efc4" text-anchor="middle" id="tvPlayText" class="play-text-anim" style="display: none;">PLAY</text>

                    <polygon points="30,40 90,25 60,110" fill="#ffffff" opacity="0.2" pointer-events="none" /> 
                    <circle cx="175" cy="40" r="10" fill="#2f3640" /> 
                    <circle cx="175" cy="80" r="10" fill="#2f3640" /> 
                </svg>
            </div>

            <!-- Единорожка (ВОССТАНОВЛЕН БОЛЬШОЙ РАЗМЕР) -->
            <div id="unicornContainer">
                <svg viewBox="40 10 220 245" id="unicornSvg">
                    <defs>
                        <linearGradient id="rainbowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#ff7eb3" />
                            <stop offset="50%" stop-color="#74b9ff" />
                            <stop offset="100%" stop-color="#55efc4" />
                        </linearGradient>
                    </defs>

                    <!-- Группа, которая ловит клики (только тело единорожки) -->
                    <g id="unicornBodyGroup">
                        <ellipse cx="150" cy="240" rx="45" ry="7" fill="rgba(0,0,0,0.1)" />
                        <path class="wagging-tail" d="M 175 190 C 240 180, 250 240, 190 235 Z" fill="url(#rainbowGrad)" />
                        <ellipse cx="105" cy="220" rx="20" ry="16" fill="#f1f2f6" />
                        <circle cx="105" cy="220" r="8" fill="#ff99a8" />
                        <ellipse cx="195" cy="220" rx="20" ry="16" fill="#f1f2f6" />
                        <circle cx="195" cy="220" r="8" fill="#ff99a8" />
                        <ellipse cx="150" cy="180" rx="52" ry="48" fill="#ffffff" />
                        <path d="M 150 70 C 220 80, 200 170, 170 170 C 180 140, 160 100, 150 70 Z" fill="url(#rainbowGrad)" />
                        <path d="M 120 95 L 105 60 L 135 80 Z" fill="#ffffff" />
                        <path d="M 180 95 L 195 60 L 165 80 Z" fill="#ffffff" />
                        <circle cx="150" cy="120" r="42" fill="#ffffff" />
                        <polygon points="143,78 157,78 150,25" fill="#FFD700" />
                        <path d="M 145 65 L 155 65" stroke="#FFA500" stroke-width="2" />
                        <path d="M 147 50 L 153 50" stroke="#FFA500" stroke-width="2" />
                        <path d="M 148 35 L 152 35" stroke="#FFA500" stroke-width="2" />
                        <path d="M 150 75 C 110 70, 95 110, 105 130 C 120 105, 145 95, 160 85 Z" fill="url(#rainbowGrad)" />
                        <ellipse cx="150" cy="145" rx="20" ry="12" fill="#FFE4E1" />
                        <path d="M 145 146 Q 150 152 155 146" fill="none" stroke="#ff6b81" stroke-width="2" stroke-linecap="round" />
                        <g class="blinking-eyes">
                            <circle cx="128" cy="118" r="6" fill="#2d3436" />
                            <circle cx="126" cy="116" r="2" fill="#ffffff" />
                            <circle cx="172" cy="118" r="6" fill="#2d3436" />
                            <circle cx="170" cy="116" r="2" fill="#ffffff" />
                        </g>
                        <circle cx="112" cy="135" r="5" fill="#ff7675" opacity="0.6" />
                        <circle cx="188" cy="135" r="5" fill="#ff7675" opacity="0.6" />
                        <g transform="rotate(35 110 175)">
                            <rect x="100" y="175" width="20" height="35" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />
                            <circle cx="110" cy="202" r="5" fill="#ff99a8" />
                        </g>
                        <g transform="rotate(-35 190 175)">
                            <rect x="180" y="175" width="20" height="35" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />
                            <circle cx="190" cy="202" r="5" fill="#ff99a8" />
                        </g>
                    </g>
                </svg>
            </div>

            <!-- ИНДИКАТОРЫ -->
            <div class="stats-container">
                <div class="stat-indicator"><div class="fill-level" id="hungerFill"></div><span class="icon">🍖</span></div>
                <div class="stat-indicator"><div class="fill-level" id="happyFill"></div><span class="icon">💖</span></div>
                <div class="stat-indicator"><div class="fill-level" id="energyFill"></div><span class="icon">⚡</span></div>
            </div>

        </div> <!-- Конец Game Area -->
    </div>

    <script>
        const loadingScreen = document.getElementById('loadingScreen');
        const progressBar = document.getElementById('progressBar');
        const mainMenu = document.getElementById('mainMenu');
        const gameScreen = document.getElementById('gameScreen');
        const miniGamesScreen = document.getElementById('miniGamesScreen');
        
        const playBtn = document.getElementById('playBtn');
        const exitBtn = document.getElementById('exitBtn');
        const backBtn = document.getElementById('backBtn');

        const hungerFill = document.getElementById('hungerFill');
        const happyFill = document.getElementById('happyFill');
        const energyFill = document.getElementById('energyFill');
        
        // Теперь мы вешаем слушатели на группу тела, а не на весь SVG-квадрат
        const unicornBodyGroup = document.getElementById('unicornBodyGroup');
        const unicornSvg = document.getElementById('unicornSvg');
        const speechBubble = document.getElementById('speechBubble');

        // Элементы ТВ
        const tvGroup = document.getElementById('tvGroup');
        const tvLoadingBg = document.getElementById('tvLoadingBg');
        const tvLoadingBar = document.getElementById('tvLoadingBar');
        const tvPlayText = document.getElementById('tvPlayText');

        let stats = { hunger: 80, happy: 70, energy: 100 };
        let bubbleTimeout;

        // --- ЛОГИКА ЗАГРУЗКИ ---
        window.addEventListener('load', () => {
            setTimeout(() => { progressBar.style.width = '100%'; }, 50);
            setTimeout(() => {
                loadingScreen.style.opacity = '0'; 
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    mainMenu.style.display = 'flex'; 
                }, 800);
            }, 2500); 
        });

        // Запуск игры
        playBtn.addEventListener('click', () => {
            mainMenu.style.display = 'none';
            gameScreen.style.display = 'block'; 
            updateUI();
            startTvAnimation();
        });

        exitBtn.addEventListener('click', () => {
            alert('Спасибо за игру! Единорожка будет скучать! 💖');
        });

        // --- АНИМАЦИЯ И КЛИК ПО ТВ ---
        let isTvReady = false; 

        function startTvAnimation() {
            isTvReady = false; 
            tvPlayText.style.display = 'none';
            tvLoadingBar.style.width = '0px';
            tvLoadingBg.style.display = 'block';
            tvLoadingBar.style.display = 'block';

            setTimeout(() => { tvLoadingBar.style.width = '90px'; }, 100);

            setTimeout(() => {
                tvLoadingBg.style.display = 'none';
                tvLoadingBar.style.display = 'none';
                tvPlayText.style.display = 'block';
                isTvReady = true; 
            }, 2200);
        }

        ['click', 'pointerup'].forEach(eventType => {
            tvGroup.addEventListener(eventType, (e) => {
                e.preventDefault();
                e.stopPropagation(); 
                if (isTvReady) {
                    gameScreen.style.display = 'none';
                    miniGamesScreen.style.display = 'flex';
                    isTvReady = false; 
                }
            });
        });

        // Возврат из мини-игр
        backBtn.addEventListener('click', () => {
            miniGamesScreen.style.display = 'none';
            gameScreen.style.display = 'block';
            startTvAnimation(); 
        });

        // --- ЛОГИКА ИНТЕРФЕЙСА ---
        function updateUI() {
            hungerFill.style.height = stats.hunger + '%';
            happyFill.style.height = stats.happy + '%';
            energyFill.style.height = stats.energy + '%';
        }

        function speak(text, type) {
            speechBubble.innerText = text;
            speechBubble.style.opacity = '1';
            if (type === 'bad') {
                speechBubble.style.setProperty('--bg-color', '#ff4757');
                speechBubble.style.setProperty('--text-color', 'white');
            } else {
                speechBubble.style.setProperty('--bg-color', 'rgba(255, 255, 255, 0.95)');
                speechBubble.style.setProperty('--text-color', '#d03e56');
            }
            clearTimeout(bubbleTimeout);
            bubbleTimeout = setTimeout(() => { speechBubble.style.opacity = '0'; }, 2000); 
        }

        function animatePet(scale = 1.05) {
            unicornSvg.style.transform = `scale(${scale})`;
            setTimeout(() => { unicornSvg.style.transform = 'scale(1)'; }, 150);
        }

        // --- ЛОГИКА ЖЕСТОВ НА ЕДИНОРОЖКЕ ---
        let startX, startY, lastX, lastY;
        let isDragging = false;
        let totalMove = 0; 

        unicornBodyGroup.addEventListener('pointerdown', (e) => {
            startX = e.clientX; startY = e.clientY;
            lastX = e.clientX; lastY = e.clientY;
            isDragging = true; totalMove = 0;
            unicornBodyGroup.setPointerCapture(e.pointerId);
        });

        unicornBodyGroup.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            totalMove += Math.abs(e.clientX - lastX) + Math.abs(e.clientY - lastY);
            lastX = e.clientX; lastY = e.clientY;
        });

        unicornBodyGroup.addEventListener('pointerup', (e) => {
            if (!isDragging) return;
            isDragging = false;
            unicornBodyGroup.releasePointerCapture(e.pointerId);

            let dy = e.clientY - startY;

            if (totalMove < 15) {
                speak('Ой, больно! 😭', 'bad');
                stats.happy = Math.max(0, stats.happy - 15);
                animatePet(0.95); 
                updateUI();
            } else if (dy > 60) {
                speak('Ммм, как приятно! 🥰', 'good');
                stats.happy = Math.min(100, stats.happy + 15);
                animatePet(1.05);
                updateUI();
            } else if (totalMove > 40) {
                speak('Хи-хи, щекотно! ✨', 'good');
                stats.happy = Math.min(100, stats.happy + 10);
                animatePet(1.05);
                updateUI();
            }
        });

        // Падение характеристик
        setInterval(() => {
            if (gameScreen.style.display === 'block') {
                stats.hunger = Math.max(0, stats.hunger - 2);
                stats.happy = Math.max(0, stats.happy - 1);
                stats.energy = Math.max(0, stats.energy - 1);
                updateUI();
            }
        }, 3000);

    </script>
</body>
</html>
